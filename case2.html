<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPL POCUS 症例トレーナー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --surface: #faf7f2;
  --surface2: #ede8df;
  --border: #c8bfaa;
  --border2: #a89880;
  --ink: #1a1208;
  --ink2: #4a3f2f;
  --ink3: #7a6a55;
  --red: #c0392b;
  --amber: #d97706;
  --green: #166534;
  --blue: #1d4ed8;
  --accent: #8b1a1a;
  --mono: 'Space Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  min-height: 100vh;
}

/* Grain texture overlay */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9999; opacity:0.6;
}

/* ─── LAYOUT ─── */
.app { display:flex; min-height:100vh; }

/* ─── MAIN ─── */
.main {
  flex:1;
  overflow-y:auto;
  min-height:100vh;
}

/* ─── CASE SCREEN ─── */
.case-screen { padding: 32px 40px; max-width: 800px; }

.case-header {
  display:flex; align-items:flex-start; gap:16px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--border);
}

.case-badge {
  background: var(--accent);
  color:#fff;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing:2px;
  padding: 4px 10px;
  border-radius: 4px;
  white-space:nowrap;
}

.case-meta { flex:1; }

.case-setting-tag {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--ink3);
  text-transform:uppercase;
  margin-bottom: 4px;
}

.case-title-main {
  font-size: 22px;
  font-weight: 900;
  color: var(--ink);
  margin-bottom: 4px;
}

.case-subtitle { font-size: 13px; color: var(--ink3); }

/* Info box */
.info-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 20px;
}

.info-box-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
}

.info-row {
  display:flex; gap:12px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size:13px;
}
.info-row:last-child { border:none; }
.info-key { color:var(--ink3); min-width:100px; }
.info-val { color:var(--ink); font-weight:500; }

/* ─── ACTION PANEL ─── */
.action-panel {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}

.action-panel-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color: var(--ink3);
  margin-bottom: 14px;
  display:flex; align-items:center; gap:8px;
}

.action-panel-title::after {
  content:'';
  flex:1; height:1px; background:var(--border);
}

.action-grid {
  display:flex; flex-wrap:wrap; gap:8px;
}

.act-btn {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 7px 14px;
  font-size:12px;
  color: var(--ink2);
  cursor:pointer;
  font-family: var(--sans);
  transition: all 0.15s;
  white-space:nowrap;
}

.act-btn:hover {
  background: var(--ink);
  color: #f0e8d8;
  border-color: var(--ink);
}

.act-btn.revealed {
  background: rgba(22,101,52,0.08);
  border-color: var(--green);
  color: var(--green);
}

/* ─── RESPONSE LOG ─── */
.response-log {
  display:flex; flex-direction:column; gap:14px;
  margin-bottom: 20px;
}

.log-entry {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow:hidden;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity:0; transform:translateY(6px); }
  to { opacity:1; transform:translateY(0); }
}

.log-entry-head {
  padding: 8px 14px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing:1px;
  color: var(--ink3);
  display:flex; align-items:center; gap:8px;
}

.log-entry-head .dot {
  width:6px; height:6px; border-radius:50%;
  background: var(--green);
}

.log-body {
  padding: 14px 16px;
  font-size: 13px;
  line-height:1.8;
  color: var(--ink2);
}

.log-body strong { color:var(--ink); }
.log-body .warn { color:var(--red); font-weight:600; }
.log-body .ok { color:var(--green); font-weight:600; }
.log-body .caution { color:var(--amber); font-weight:600; }

.val-table { width:100%; border-collapse:collapse; margin-top:8px; }
.val-table td {
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  font-size:13px;
  vertical-align:top;
}
.val-table td:first-child { color:var(--ink3); min-width:130px; padding-right:12px; }
.val-table td:last-child { color:var(--ink); }
.val-table tr:last-child td { border:none; }

/* ─── FREE QUESTION ─── */
.freeq-area {
  display:flex; gap:10px;
  margin-bottom: 20px;
}

.freeq-input {
  flex:1;
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  background: var(--surface);
  color: var(--ink);
  font-family: var(--sans);
  outline:none;
  transition: border-color 0.2s;
}
.freeq-input:focus { border-color: var(--ink); }
.freeq-input::placeholder { color:var(--ink3); }

.freeq-btn {
  background: var(--ink);
  color:#f0e8d8;
  border:none;
  border-radius:8px;
  padding: 0 20px;
  font-size:13px;
  font-family:var(--sans);
  cursor:pointer;
  transition: opacity 0.2s;
  white-space:nowrap;
}
.freeq-btn:hover { opacity:0.8; }

/* ─── PHASE BAR ─── */
.phase-bar {
  display:flex; gap:4px;
  margin-bottom: 24px;
}

.phase-step {
  flex:1;
  height:4px;
  border-radius:4px;
  background: var(--border);
  transition: background 0.3s;
}

.phase-step.done { background: var(--green); }
.phase-step.current { background: var(--amber); }

.phase-label {
  display:flex; justify-content:space-between;
  font-size:10px; font-family:var(--mono);
  color:var(--ink3);
  margin-bottom: 16px;
}

/* ─── FINISH BUTTON ─── */
.finish-btn {
  width:100%;
  background: var(--accent);
  color:#fff;
  border:none;
  border-radius: 10px;
  padding: 14px;
  font-size:15px;
  font-weight:700;
  font-family:var(--sans);
  cursor:pointer;
  transition: opacity 0.2s;
  margin-bottom:20px;
  display:none;
}
.finish-btn:hover { opacity:0.88; }
.finish-btn.visible { display:block; }

/* ─── SCORE SHEET ─── */
.score-sheet {
  background: var(--surface);
  border: 2px solid var(--ink);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 32px;
  display:none;
}

.score-sheet.visible { display:block; animation: slideIn 0.4s ease; }

.score-sheet-title {
  font-family: var(--mono);
  font-size: 14px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--ink);
  margin-bottom:4px;
}

.score-sheet-sub {
  font-size:12px; color:var(--ink3);
  margin-bottom: 20px;
}

.score-table { width:100%; border-collapse:collapse; }
.score-table th {
  text-align:left;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--ink3);
  padding: 6px 8px;
  border-bottom: 2px solid var(--border2);
}

.score-table td {
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  font-size:13px;
  vertical-align:top;
}

.score-table tr:last-child td { border:none; }

.score-check {
  display:flex; gap:8px; align-items:center;
}

.check-box {
  width:20px; height:20px;
  border: 2px solid var(--border2);
  border-radius:4px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:13px;
  transition: all 0.15s;
  flex-shrink:0;
}
.check-box.checked {
  background: var(--green);
  border-color: var(--green);
  color:#fff;
}

.score-pts {
  font-family:var(--mono);
  font-size:12px;
  color:var(--ink3);
  white-space:nowrap;
}

.total-score-area {
  margin-top:20px;
  padding-top:16px;
  border-top: 2px solid var(--ink);
  display:flex; justify-content:space-between; align-items:center;
}

.total-label { font-size:14px; font-weight:700; }

.total-val {
  font-family:var(--mono);
  font-size:28px;
  font-weight:700;
  color:var(--accent);
}

.score-comment {
  margin-top:16px;
  padding: 14px 16px;
  border-radius:8px;
  font-size:13px;
  line-height:1.7;
}

.score-comment.great { background:rgba(22,101,52,0.08); border:1px solid rgba(22,101,52,0.2); color:var(--green); }
.score-comment.good { background:rgba(217,119,6,0.08); border:1px solid rgba(217,119,6,0.2); color:var(--amber); }
.score-comment.review { background:rgba(192,57,43,0.08); border:1px solid rgba(192,57,43,0.2); color:var(--red); }

/* ─── UTIL ─── */
.hidden { display:none !important; }

@media (max-width:700px) {
  .case-screen { padding:20px 16px; }
}
</style>
</head>
<body>
<div class="app">

<!-- ═══ MAIN ═══ -->
<main class="main" id="mainArea">
  <div class="case-screen" id="caseScreen">

    <div class="case-header">
      <div class="case-meta">
        <div class="case-setting-tag" id="caseSettingTag"></div>
        <div class="case-title-main" id="caseTitleMain"></div>
        <div class="case-subtitle" id="caseSubtitle"></div>
      </div>
      <div class="case-badge" id="caseBadge"></div>
    </div>

    <!-- Phase bar -->
    <div class="phase-bar">
      <div class="phase-step current" id="ph0"></div>
      <div class="phase-step" id="ph1"></div>
      <div class="phase-step" id="ph2"></div>
      <div class="phase-step" id="ph3"></div>
      <div class="phase-step" id="ph4"></div>
    </div>
    <div class="phase-label">
      <span>初期情報</span>
      <span>問診・バイタル</span>
      <span>身体所見</span>
      <span>エコー</span>
      <span>初期対応</span>
    </div>

    <!-- Initial info -->
    <div class="info-box">
      <div class="info-box-label">初期情報（開示済）</div>
      <div id="initialInfo"></div>
    </div>

    <!-- Action buttons -->
    <div class="action-panel">
      <div class="action-panel-title">情報を確認する</div>
      <div class="action-grid" id="actionGrid"></div>
    </div>

    <!-- Free question -->
    <div class="freeq-area">
      <input class="freeq-input" id="freeqInput" placeholder="自由に質問（例：右膝を押したら？　膝蓋上嚢エコーをあてたら？）"
        onkeydown="if(event.key==='Enter') freeQuestion()">
      <button class="freeq-btn" onclick="freeQuestion()">質問 →</button>
    </div>

    <!-- Response log -->
    <div class="response-log" id="responseLog"></div>

    <!-- Finish button -->
    <button class="finish-btn" id="finishBtn" onclick="showScoreSheet()">
      ✅ 初期対応を終了して採点シートへ
    </button>

    <!-- Score sheet -->
    <div class="score-sheet" id="scoreSheet">
      <div class="score-sheet-title">評価チェックシート</div>
      <div class="score-sheet-sub" id="scoreSheetSub"></div>
      <table class="score-table" id="scoreTable"></table>
      <div class="total-score-area">
        <div class="total-label">合計点</div>
        <div class="total-val" id="totalScoreVal">— / 20</div>
      </div>
      <div class="score-comment" id="scoreComment"></div>
    </div>

  </div>
</main>
</div>

<script>
// ══════════════════════════════════════════════
// CASE DATABASE
// ══════════════════════════════════════════════
const CASES = [

    ],

    blocks: {

      { item:'治療方針', criteria:'関節穿刺（診断・治療兼用）、NSAIDs/コルヒチン/ステロイドの選択根拠、感染除外の方針', max:2 },
      { item:'説明', criteria:'患者・家族へ病状説明（偽痛風・関節穿刺の必要性・今後の治療）を分かりやすく行う', max:1 },
    ]
  }
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentCase = null;
let revealedBlocks = new Set();

// ══════════════════════════════════════════════
// OPEN CASE
// ══════════════════════════════════════════════
function openCase(idx) {
  currentCase = CASES[idx];
  revealedBlocks = new Set();

  // header
  document.getElementById('caseSettingTag').textContent = currentCase.setting;
  document.getElementById('caseTitleMain').textContent = currentCase.chief;
  document.getElementById('caseSubtitle').textContent = currentCase.subtitle;
  document.getElementById('caseBadge').textContent = currentCase.badge;

  // initial info
  const ii = document.getElementById('initialInfo');
  ii.innerHTML = currentCase.initial.map(r =>
    `<div class="info-row"><span class="info-key">${r.key}</span><span class="info-val">${r.val}</span></div>`
  ).join('');

  // action grid
  buildActionGrid();

  // clear log
  document.getElementById('responseLog').innerHTML = '';
  document.getElementById('freeqInput').value = '';
  document.getElementById('finishBtn').classList.remove('visible');
  document.getElementById('scoreSheet').classList.remove('visible');

  // phase bar
  updatePhaseBar(0);
}

function buildActionGrid() {
  const grid = document.getElementById('actionGrid');
  grid.innerHTML = '';
  const blocks = currentCase.blocks;

  Object.keys(blocks).forEach(key => {
    const b = blocks[key];
    const btn = document.createElement('button');
    btn.className = 'act-btn';
    btn.id = 'btn_' + key;
    btn.textContent = b.label;
    btn.onclick = () => revealBlock(key);
    grid.appendChild(btn);
  });
}

// ══════════════════════════════════════════════
// REVEAL BLOCK
// ══════════════════════════════════════════════
function revealBlock(key) {
  const block = currentCase.blocks[key];
  if (!block) return;

  const btn = document.getElementById('btn_' + key);
  if (btn) btn.classList.add('revealed');

  revealedBlocks.add(key);

  addLogEntry(block.label, block.content, block.echoComment);
  updatePhaseBar(block.phase);
  checkFinishVisible();
}

function addLogEntry(label, content, isEcho) {
  const log = document.getElementById('responseLog');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <div class="log-entry-head">
      <div class="dot" style="background:${isEcho ? '#1d4ed8' : '#166534'}"></div>
      ${label}
    </div>
    <div class="log-body">${content}</div>`;
  log.appendChild(entry);
  entry.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ══════════════════════════════════════════════
// FREE QUESTION
// ══════════════════════════════════════════════
function freeQuestion() {
  const input = document.getElementById('freeqInput');
  const q = input.value.trim();
  if (!q || !currentCase) return;
  input.value = '';

  const key = detectFreeQ(q);
  if (key && currentCase.blocks[key]) {
    revealBlock(key);
  } else {
    addLogEntry('📝 ' + q,
      `<span style="color:var(--ink3)">この情報はこの症例では取得できないか、別のボタンから確認してください。<br>
      ヒント：バイタル、問診、身体所見、各エコー部位のボタンを活用してください。</span>`,
      false);
  }
}

function detectFreeQ(t) {
  t = t.toLowerCase();
  if (/abcde|一次評価|気道|airway|呼吸音|呼吸様式|末梢冷感|冷汗|意識.*レベル|麻痺|瞳孔|環境/.test(t)) return 'abcde';
  if (/opqrst|onset|発症.*様式|増悪|寛解|quality|痛み.*性状|region|radiation|放散|severity|nrs|time.*経過/.test(t)) return 'opqrst';
  if (/痛み.*いつ|いつから.*痛|どんな.*痛み|どこが.*痛|どのくらい.*痛|ずっと.*痛|随伴症状/.test(t)) return 'opqrst';
  if (/ample|allergy|アレルギー|medication|最終食事|last meal|内服|既往/.test(t)) return 'ample';
  if (/バイタル|血圧|脈拍|体温|spo2|呼吸数/.test(t)) return 'vital';
  if (/問診|現病歴|主訴|痛み.*性状|どこが痛|発症/.test(t)) return 'opqrst';
  if (/身体所見|触診|触れ|膝.*腫|関節.*腫|聴診|皮疹|リンパ/.test(t)) return 'physical';
  if (/採血|血液検査|wbc|crp|hb|炎症|lac|尿酸|ua/.test(t)) return 'lab';
  if (/肺エコー|lung|bライン|気胸|胸膜sliding/.test(t)) return 'echo_lung';
  if (/plax|長軸|傍胸骨.*長/.test(t)) return 'echo_plax';
  if (/psax|短軸|傍胸骨.*短|d.shape/.test(t)) return 'echo_psax';
  if (/a4c|四腔|心尖/.test(t)) return 'echo_a4c';
  if (/ivc|下大静脈|虚脱/.test(t)) return 'echo_ivc';
  if (/fast.*エコー|モリソン|脾周囲|腹水エコー/.test(t)) return 'echo_fast';
  if (/腹部大動脈|大動脈.*エコー|大動脈瘤|aorta/.test(t)) return 'echo_aorta';
  if (/胆嚢|胆石|murphy/.test(t)) return 'echo_gallbladder';
  if (/腎臓|水腎|腎盂/.test(t)) return 'echo_kidney';
  if (/dvt|下肢.*静脈|膝窩静脈|血栓/.test(t)) return 'echo_dvt';
  if (/膝蓋上嚢|膝.*エコー|cppd|偽痛風/.test(t)) return 'echo_knee';
  if (/肩|上腕二頭筋|長頭腱/.test(t)) return 'echo_shoulder';
  if (/甲状腺/.test(t)) return 'echo_thyroid';
  if (/鑑別|診断|cppd|偽痛風/.test(t)) return 'dx';
  return null;
}

// ══════════════════════════════════════════════
// PHASE BAR
// ══════════════════════════════════════════════
let maxPhase = 0;

function updatePhaseBar(phase) {
  if (phase > maxPhase) {
    for (let i = 0; i <= maxPhase; i++) {
      const el = document.getElementById('ph' + i);
      if (el) el.className = 'phase-step done';
    }
    document.getElementById('ph' + phase).className = 'phase-step current';
    maxPhase = phase;
  }
  if (maxPhase >= 3) {
    document.getElementById('finishBtn').classList.add('visible');
  }
}

function checkFinishVisible() {
  if (maxPhase >= 3) {
    document.getElementById('finishBtn').classList.add('visible');
  }
}

// ══════════════════════════════════════════════
// FINISH / SCORE
// ══════════════════════════════════════════════
function showScoreSheet() {
  document.getElementById('finishBtn').classList.remove('visible');
  const sheet = document.getElementById('scoreSheet');
  sheet.classList.add('visible');
  sheet.scrollIntoView({ behavior:'smooth' });

  document.getElementById('scoreSheetSub').textContent =
    `${currentCase.badge} ／ 合計${currentCase.scoreItems.reduce((s,i)=>s+i.max,0)}点満点　（隠れた診断：${currentCase.hiddenDx}）`;

  buildScoreTable();
}

function buildScoreTable() {
  const table = document.getElementById('scoreTable');
  table.innerHTML = `
    <thead>
      <tr>
        <th>評価項目</th>
        <th>評価基準</th>
        <th style="text-align:center">得点</th>
        <th style="text-align:center">MAX</th>
      </tr>
    </thead>
    <tbody id="scoreTbody"></tbody>`;

  const tbody = document.getElementById('scoreTbody');
  currentCase.scoreItems.forEach((item, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${item.item}</strong></td>
      <td style="color:var(--ink3); font-size:12px;">${item.criteria}</td>
      <td style="text-align:center;">
        <div class="score-check">
          ${buildScoreBoxes(i, item.max)}
        </div>
      </td>
      <td style="text-align:center; font-family:var(--mono); color:var(--ink3);">${item.max}</td>`;
    tbody.appendChild(tr);
  });

  updateTotalScore();
}

function buildScoreBoxes(rowIdx, max) {
  let html = '';
  for (let v = 1; v <= max; v++) {
    html += `<div class="check-box" id="chk_${rowIdx}_${v}" onclick="toggleScore(${rowIdx},${v},${max})">${v}</div>`;
  }
  return html;
}

let scoreState = {};

window.addEventListener('DOMContentLoaded', () => {
  openCase(0);
});

function toggleScore(row, val, max) {
  const key = `r${row}`;
  const cur = scoreState[key] || 0;
  scoreState[key] = (cur === val) ? 0 : val;

  for (let v = 1; v <= max; v++) {
    const box = document.getElementById(`chk_${row}_${v}`);
    if (!box) continue;
    const sel = scoreState[key];
    if (sel >= v) {
      box.className = 'check-box checked';
    } else {
      box.className = 'check-box';
    }
  }
  updateTotalScore();
}

function updateTotalScore() {
  const total = Object.values(scoreState).reduce((a,b) => a+b, 0);
  const maxTotal = currentCase.scoreItems.reduce((s,i) => s+i.max, 0);
  document.getElementById('totalScoreVal').textContent = `${total} / ${maxTotal}`;

  const comment = document.getElementById('scoreComment');
  const pct = total / maxTotal;
  if (pct >= 0.85) {
    comment.className = 'score-comment great';
    comment.innerHTML = `🏆 <strong>優秀！</strong>　${total}点 / ${maxTotal}点。びまん性疼痛の中から右膝関節炎を同定し、エコーでCPPDを適切に診断できました。本番でも自信を持って臨んでください。`;
  } else if (pct >= 0.65) {
    comment.className = 'score-comment good';
    comment.innerHTML = `✅ <strong>良好。</strong>　${total}点 / ${maxTotal}点。基本的な流れは掴めています。「膝蓋上嚢の点状高輝度エコー＝CPPD示唆」というポイントと、エコーコメントの声出しをさらに練習しましょう。`;
  } else {
    comment.className = 'score-comment review';
    comment.innerHTML = `📖 <strong>要復習。</strong>　${total}点 / ${maxTotal}点。「発熱＋びまん性疼痛」の高齢者では局所の関節炎が隠れていることを意識してください。膝エコー（膝蓋上嚢の液体貯留＋点状エコー）の描出を重点的に練習しましょう。`;
  }
}
</script>
